services:
  tunel:
    image: cloudflare/cloudflared:latest
    container_name: tunel
    hostname: tunel
    restart: always
    pull_policy: always
    dns:
      - 192.168.1.1 # change me
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    network_mode: "host"
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=TUNNEL_TOKEN # change me
      - TUNNEL_TRANSPORT_PROTOCOL=auto
      - TUNNEL_EDGE_IP_VERSION=auto
      - TUNNEL_GRACE_PERIOD=20s
      - TUNNEL_RETRIES=10
      - NO_AUTOUPDATE
      - TUNNEL_POST_QUANTUM
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
